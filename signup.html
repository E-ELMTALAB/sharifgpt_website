<script>
$(document).ready(function() {
    $("#signup-form").submit(function(event) {
        event.preventDefault();

        var email = $('input[name="email"]').val();
        var username = $('input[name="username"]').val();
        var password = $('input[name="password"]').val();
        var confirmPassword = $('input[name="confirm_password"]').val();

        // Basic validation for password matching
        if (password !== confirmPassword) {
            alert("Passwords do not match.");
            return;
        }

        $.ajax({
            url: 'https://sharifgpt-login.elmtalab3638.workers.dev/api/signup',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ email: email, username: username, password: password }),
            success: function(response) {
                alert('Signup Successful');
                // Additional success handling
            },
            error: function(xhr, status, error) {
                alert('Signup Failed: ' + xhr.responseText);
                // Additional error handling
            }
        });
    });
});
</script>
